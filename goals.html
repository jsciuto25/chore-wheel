<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Summer Goals</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Baloo+2:wght@700;800&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html, body {
  width:100%; height:100%;
  overflow:hidden;
  background: transparent;
  font-family: 'Nunito', sans-serif;
  color: #fff;
}

.wrap {
  width:100%; height:100%;
  padding: 10px 14px 8px;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  align-items: start;
  background: rgba(10, 15, 30, 0.82);
  backdrop-filter: blur(6px);
}

/* ── KID COLUMN ── */
.kid-col { display:flex; flex-direction:column; gap:5px; }

.kid-heading {
  font-family: 'Baloo 2', cursive;
  font-size: 1rem;
  font-weight: 800;
  padding: 4px 10px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 2px;
}
.kid-heading.annabel { background: rgba(255,107,157,0.22); color: #FF8DB8; }
.kid-heading.james   { background: rgba(59,191,184,0.18); color: #5DDBD5; }
.kid-heading.luke    { background: rgba(255,179,71,0.18);  color: #FFC45A; }

.kid-pct { font-size:0.78rem; opacity:0.8; }

/* ── GOAL ROW ── */
.goal-row {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 3px 6px;
}
.g-icon { font-size:0.78rem; width:16px; text-align:center; flex-shrink:0; }
.g-body { flex:1; min-width:0; }
.g-name {
  font-size: 0.68rem;
  font-weight: 800;
  color: rgba(255,255,255,0.85);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  line-height: 1.2;
}
.goal-row.done .g-name { color:rgba(255,255,255,0.35); text-decoration:line-through; }

/* progress bar */
.g-bar-track {
  height: 5px;
  background: rgba(255,255,255,0.1);
  border-radius: 10px;
  overflow: hidden;
  margin-top: 2px;
}
.g-bar-fill {
  height:100%;
  border-radius:10px;
  width: 0%;
}
.g-bar-fill.annabel { background: linear-gradient(90deg,#c9426e,#FF6B9D); }
.g-bar-fill.james   { background: linear-gradient(90deg,#1E8F89,#3BBFB8); }
.g-bar-fill.luke    { background: linear-gradient(90deg,#C47E00,#FFB347); }
.g-bar-fill.complete { background: linear-gradient(90deg,#16A34A,#4ADE80) !important; }

.g-val { font-size:0.58rem; color:rgba(255,255,255,0.38); font-weight:700; margin-top:1px; }

/* check circle */
.g-check {
  width:13px; height:13px; border-radius:50%;
  border:1.5px solid rgba(255,255,255,0.2);
  flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  font-size:0.5rem;
}
.g-check.done { background:#4ADE80; border-color:#4ADE80; }

/* divider between kids */
.kid-col + .kid-col {
  border-left: 1px solid rgba(255,255,255,0.07);
  padding-left: 12px;
}
</style>
</head>
<body>
<div class="wrap" id="wrap"></div>

<script>
// ── Edit progress here until Firebase is connected ──
// For count goals: set current value. For check goals: true/false.
const PROGRESS = {
  a_tri:    false,
  a_bike:   0,      // out of 100
  a_books:  0,      // out of 10
  a_math:   0,      // out of 30
  a_scout:  false,
  a_swim:   false,
  a_merit:  0,      // out of 10

  j_books:  0,      // out of 15
  j_phys:   0,      // out of 30
  j_tri:    false,
  j_pres:   false,
  j_math:   0,      // out of 30
  j_hand:   0,      // out of 30
  j_game:   false,

  l_letters: 0,     // out of 26
  l_add:    false,
};

const KIDS = [
  { id:"annabel", name:"Annabel", emoji:"🎀", goals:[
    {id:"a_tri",    title:"Sprint Triathlon",      type:"check", icon:"🏊"},
    {id:"a_bike",   title:"Bike 100 miles",        type:"count", icon:"🚴", target:100},
    {id:"a_books",  title:"Read 10 books",         type:"count", icon:"📚", target:10},
    {id:"a_math",   title:"Math sheets 3×/wk",    type:"count", icon:"✏️", target:30},
    {id:"a_scout",  title:"First Class Rank",      type:"check", icon:"🏅"},
    {id:"a_swim",   title:"Swim a mile",           type:"check", icon:"🌊"},
    {id:"a_merit",  title:"10 Merit Badges",       type:"count", icon:"🎖️", target:10}
  ]},
  { id:"james", name:"James", emoji:"🏊", goals:[
    {id:"j_books",  title:"Read 15 books",         type:"count", icon:"📚", target:15},
    {id:"j_phys",   title:"Physical activity 3×/wk",type:"count",icon:"⚽", target:30},
    {id:"j_tri",    title:"Kids Triathlon",        type:"check", icon:"🏊"},
    {id:"j_pres",   title:"Give presentation",    type:"check", icon:"🎤"},
    {id:"j_math",   title:"Math sheets 3×/wk",    type:"count", icon:"✏️", target:30},
    {id:"j_hand",   title:"Handwriting 3×/wk",    type:"count", icon:"🖊️", target:30},
    {id:"j_game",   title:"Host a gameshow",       type:"check", icon:"🎮"}
  ]},
  { id:"luke", name:"Luke", emoji:"⭐", goals:[
    {id:"l_letters",title:"Know all 26 letters",  type:"count", icon:"🔤", target:26},
    {id:"l_add",    title:"Single-digit addition", type:"check", icon:"➕"}
  ]}
];

function frac(g) {
  const v = PROGRESS[g.id];
  if(g.type==="count") return Math.min(1, (v||0)/g.target);
  return v ? 1 : 0;
}
function kidPct(kid) {
  return Math.round(kid.goals.reduce((s,g)=>s+frac(g),0)/kid.goals.length*100);
}

const wrap = document.getElementById("wrap");
KIDS.forEach(kid => {
  const pct = kidPct(kid);
  let html = `<div class="kid-col">
    <div class="kid-heading ${kid.id}">
      <span>${kid.emoji} ${kid.name}</span>
      <span class="kid-pct">${pct}%</span>
    </div>`;

  kid.goals.forEach(g => {
    const f = frac(g);
    const done = f >= 1;
    const v = PROGRESS[g.id]||0;

    if(g.type==="count") {
      const pf = Math.round(f*100);
      html += `<div class="goal-row ${done?'done':''}">
        <span class="g-icon">${g.icon}</span>
        <div class="g-body">
          <div class="g-name">${g.title}</div>
          <div class="g-bar-track"><div class="g-bar-fill ${kid.id} ${done?'complete':''}" style="width:${pf}%"></div></div>
          <div class="g-val">${v} / ${g.target}</div>
        </div>
      </div>`;
    } else {
      html += `<div class="goal-row ${done?'done':''}">
        <span class="g-icon">${g.icon}</span>
        <div class="g-body"><div class="g-name">${g.title}</div></div>
        <div class="g-check ${done?'done':''}">${done?'✓':''}</div>
      </div>`;
    }
  });

  html += `</div>`;
  wrap.innerHTML += html;
});
</script>
</body>
</html>
